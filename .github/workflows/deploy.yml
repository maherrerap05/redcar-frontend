name: Deploy RedCar Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://redcarapi-h7a4f5f8e8ewe6h7.brazilsouth-01.azurewebsites.net/api/v1

      - name: Prepare deployment package
        run: |
          cp server.cjs dist/server.cjs
          cp package.json dist/package.json

      - name: Deploy to Azure via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: waws-prod-cq1-033.ftp.azurewebsites.windows.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: /site/wwwroot/
          protocol: ftps
          port: 990