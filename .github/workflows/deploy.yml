name: Deploy RedCar Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://redcarapi-h7a4f5f8e8ewe6h7.brazilsouth-01.azurewebsites.net/api/v1

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: RedCarFrontend
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: .